        height: 500px;

      a.kufi-button {
        background-color: #29abe0;
        border: 0 #fff !important;
        border-radius: 7px;
        box-shadow: 1px 1px 0 rgba(0, 0, 0, 0.2);
        color: #fff;
        cursor: pointer;
        display: inline-block !important;
        font-size: 14px !important;
        font-weight: 700 !important;
        line-height: 36px !important;
        min-width: 150px;
        overflow-wrap: break-word;
        padding: 0 12px !important;
        text-align: center !important;
        text-decoration: none;
        text-shadow: none;
        vertical-align: middle;
      }

      .kufi-right {
        bottom: 10px;
        min-width: 0 !important;
        position: fixed;
        right: 10px;
      }

      span.kufitext {
        text-wrap: none;
        letter-spacing: -0.15px !important;
        line-height: 33px !important;
        padding: 0;
        text-align: center;
        text-shadow: 0 1px 1px rgba(34, 34, 34, 0.05);
        vertical-align: middle;
      }

      .kufitext img.kufiimg {
        -webkit-animation: kufi-wiggle 3s infinite;
        animation: kufi-wiggle 3s infinite;
        display: initial;
        height: 15px !important;
        width: 22px !important;
      }

      .kufiimg:after,
      img.kufiimg {
        border: none;
        margin-top: 0;
        vertical-align: middle;
      }

      #autocomplete-suggestions {
        max-height: 150px; /* Set the maximum height for the suggestion list */
        overflow-y: auto; /* Enable vertical scrolling if the list exceeds the max-height */
      }

      .guess-hint {
        background-color: rgba(0, 0, 0, 0.4);
        border-bottom-right-radius: 5px;
        color: #eee;
        font-size: 14px;
        font-weight: 700;
        left: 0;
        padding: 5px 10px 7px;
        position: absolute;
        top: 0;
      }

          guessesRemaining = cookieData.guessesRemaining;
          guessesUsed = cookieData.guessesUsed;

          currentImageIndex = cookieData.currentImageIndex;

      function startTimer() {
        // Set the timer to 24 hours (24 * 60 * 60 * 1000 milliseconds)
        const timerDuration = 24 * 60 * 60 * 1000;

        // Start the timer
        setTimeout(() => {
          // Move to the next question when the timer expires
          displayNextQuestion();
        }, timerDuration);
      }

      function displayQuestion() {
        // Check if currentQuestion is within valid range
        if (currentQuestion < 0 || currentQuestion >= quizQuestions.length) {
          currentQuestion = 0;
        }

        const questionTextElement = document.getElementById("question-text");
        const answerInputElement = document.getElementById("answer-input");

        // Set the image source for each guess button
        const imageContainer = document.getElementById("image-container");
        const answerImageElement = document.getElementById("answer-image");

        currentImageNumber = 1; // Reset the current image number to 1 for the new question

        // Reset the guesses used and image index for each new question
        guessesUsed = 0;
        // Set the default image source for the first button
        answerImageElement.src = quizQuestions[currentQuestion]["image1"];

        // Update the image source for each button based on the question
        for (let i = 1; i <= 6; i++) {
          const button = document.getElementById("button-" + i);
          if (quizQuestions[currentQuestion]["image" + i]) {
            if (i <= guessesUsed) {
              answerImageElement.src =
                quizQuestions[currentQuestion]["image" + i];
            }

            if (i === 1) {
              button.disabled = false; // Enable the first button
              button.classList.remove("opacity-50", "cursor-not-allowed");
            } else {
              button.disabled = true; // Disable other buttons
              button.classList.add("opacity-50", "cursor-not-allowed");
            }

            button.addEventListener("click", function () {
              answerImageElement.src =
                quizQuestions[currentQuestion]["image" + i];
            });
          }
        }
        const guessesRemainingElement =
          document.getElementById("guesses-remaining");
        const guessesUsedElement = document.getElementById("guesses-used");

        questionTextElement.textContent =
          quizQuestions[currentQuestion].question;
        answerInputElement.value = "";
        answerImageElement.src = quizQuestions[currentQuestion].image1; // Set the image source
        guessesRemainingElement.textContent = guessesRemaining;
        guessesUsedElement.textContent = guessesUsed;
        updateTimerDisplay(); // Call the updateTimerDisplay function here to update the timer display

        const submitAnswerButton = document.getElementById(
          "submit-answer-button"
        );

        answerInputElement.addEventListener("input", function () {
          if (answerInputElement.value.trim() === "") {
            submitAnswerButton.disabled = true;
          } else {
            submitAnswerButton.disabled = false;
          }
        });

        updateImage();
      }

        const userAnswer = answerInputElement.value.toLowerCase();
        if (userAnswer === "") {
          return;

        const correctAnswer =

        const answerImageElement = document.getElementById("answer-image");
        const guessesRemainingElement =
          document.getElementById("guesses-remaining");

        if (userAnswer === correctAnswer) {

          rightGuessContainer.appendChild(rightGuessText);

          // Append the container to the attempts list
          attemptsList.appendChild(rightGuessContainer);
          clearTimeout(timerId);
          // Call the updateImage() function after handling the guess
          updateImage(); // Call the updateImage function to display the next image
          currentImageNumber = guessesUsed + 1; // Set currentImageNumber to the latest image number
          // enable if you want to save amount of guesses used next turn saveCookieData();
        } else {
          if (guessesRemaining <= 1) {
            displayGameOverMessage();
          }

          // Call the updateImage() function after handling the guess
          updateImage(); // Call the updateImage function to display the next image
          currentImageNumber = guessesUsed + 1; // Set currentImageNumber to the latest image number

          // Hide "Guesses Remaining:" text
          const guessesTextElement = document.getElementById("guesses-text");
          guessesTextElement.style.display = "none";

          answerInputElement.value = "";

          const wrongButton = document.getElementById(
            "button-" + (guessesUsed + 1)
          );
          wrongButton.classList.remove("bg-blue-500");
          wrongButton.classList.add("bg-red-500");
          currentImageNumber++; // Increment the current image number for the next guess
          // Show the border around the wrong answers list
          const attemptsList = document.getElementById("attempts-list");
          attemptsList.classList.add("wrong-guess-border");

          // Create the ❌ emoji element

          attemptsList.appendChild(wrongGuessContainer);

          const buttons = document.querySelectorAll(".btn-guess");
          guessesUsed++;
          updateImage(); // Call the updateImage function to display the next image

          // Disable unused guess buttons
          buttons.forEach((button, index) => {
            if (index >= guessesUsed) {
              button.disabled = true;
              button.classList.add("opacity-50", "cursor-not-allowed");
            } else {
              // Remove the classes "opacity-50" & "cursor-not-allowed" from the used guess button
              button.disabled = false;
              button.classList.remove("opacity-50", "cursor-not-allowed");
            }
          });

          guessesRemaining--;
          // Update the "guesses-remaining" element to display "Last guess!" when there is only one guess remaining
          const guessesRemainingElement =
            document.getElementById("guesses-remaining");
          if (guessesRemaining === 1) {
            guessesRemainingElement.textContent = "Last guess!";
          } else {
            guessesRemainingElement.textContent = `${guessesRemaining} guesses remaining!`;
          }

          guessesUsedElement.textContent = guessesUsed; // Update the guesses used count display

          if (guessesRemaining <= 1) {
            displayGameOverMessage();
            const buttons = document.querySelectorAll(".btn-guess");

            // Enable all guess buttons for new guess
            buttons.forEach((button) => {
              button.disabled = false;
              button.classList.remove("opacity-50", "cursor-not-allowed");
            });
            clearTimeout(timerId);
            saveCookieData();
          } else {
            handleGuess(); // Call the handleGuess function to update guess buttons
          }
        }

        // Clear the text field after submission
        answerInputElement.value = "";
        submitAnswerButton.disabled = true; // Disable the button again after submission
      }

      function displayNextQuestion() {
        currentQuestionIndex =
          (currentQuestionIndex + 1) % quizQuestions.length;
        displayQuestion();
      }

      function handleGuess() {
        const buttons = document.querySelectorAll(".btn-guess");

        currentImageNumber = 0;

        currentImageNumber++; // Increment the current image number for the next guess

        // Enable all guess buttons for new guess
        buttons.forEach((button) => {
          button.disabled = false;
        });

        // Disable unused guess buttons
        buttons.forEach((button, index) => {
          if (index >= guessesUsed) {
            button.disabled = true;
            button.classList.add("opacity-50", "cursor-not-allowed");
          } else {
            currentImageNumber++; // Increment the current image number for the next guess
            // Remove the classes "opacity-50" & "cursor-not-allowed" from the used guess button
            button.classList.remove("opacity-50", "cursor-not-allowed");
          }
        });

        updateImage();

        // Update the "guesses-remaining" element to display "Last guess!" when there is only one guess remaining
        const guessesRemainingElement =
          document.getElementById("guesses-remaining");
        if (guessesRemaining === 1) {
          guessesRemainingElement.textContent = "Last guess!";
        } else {
          guessesRemainingElement.textContent = `${guessesRemaining} guesses remaining!`;
        }
      }

      function updateImage() {
        const answerImageElement = document.getElementById("answer-image");
        const hintElement = document.getElementById("guess-hint");
        const currentQuestionData = quizQuestions[currentQuestion];

        // Ensure currentImageNumber does not exceed 6
        if (currentImageNumber > 6) {
          currentImageNumber = 6;
        }

        if (currentQuestionData["image" + currentImageNumber]) {
          answerImageElement.src =
            currentQuestionData["image" + currentImageNumber];
        }

        // Show/hide the hint based on the currentImageNumber
        if (currentImageNumber === 3) {
          hintElement.textContent = `Genre: ${currentQuestionData.genre}`;
          hintElement.style.display = "block";
        } else if (currentImageNumber === 4) {
          hintElement.textContent = `Release: ${currentQuestionData.release}`;
          hintElement.style.display = "block";
        } else if (currentImageNumber === 5) {
          hintElement.textContent = `Label: ${currentQuestionData.label}`;
          hintElement.style.display = "block";
        } else if (currentImageNumber === 6) {
          hintElement.textContent = `Artist: ${currentQuestionData.artist}`;
          hintElement.style.display = "block";
        } else {
          hintElement.style.display = "none";
        }

        // Remove the "font-bold" class from all guess buttons
        const guessButtons = document.querySelectorAll(".guess-button");
        guessButtons.forEach((button) => {
          button.classList.remove("font-bold");
        });

        // Add the "font-bold" class to the corresponding guess button
        const currentGuessButton = document.getElementById(
          `button-${currentImageNumber}`
        );
        currentGuessButton.classList.add("font-bold");
      }

      function updateTimerDisplay() {
        const timerElement = document.getElementById("timer");
        const timeLeft = getTimeLeft();

        if (timeLeft <= 0) {
          clearInterval(timerId);
          timerElement.textContent = "00:00:00";
          alert("New anime is now available!");
          nextQuestion();
        } else {
          const hours = Math.floor(timeLeft / 3600)
            .toString()
            .padStart(2, "0");
          const minutes = Math.floor((timeLeft % 3600) / 60)
            .toString()
            .padStart(2, "0");
          const seconds = (timeLeft % 60).toString().padStart(2, "0");
          timerElement.textContent = `${hours}h ${minutes}m ${seconds}s`;
        }
      }

      // Call the updateTimerDisplay function every second using setInterval
      setInterval(updateTimerDisplay, 1000);

      function getTimeLeft() {
        const now = new Date();
        const nextQuestionDate = new Date(now);
        nextQuestionDate.setHours(0, 0, 0, 0); // Set to midnight
        nextQuestionDate.setDate(nextQuestionDate.getDate() + 1); // Add one day
        const timeLeft = Math.floor((nextQuestionDate - now) / 1000);
        return timeLeft;
      }

      function saveCookieData() {
        document.cookie = `guessesRemaining=${guessesRemaining}; expires=Sun, 1 Jan 2025 00:00:00 UTC;`;
        document.cookie = `guessesUsed=${guessesUsed}; expires=Sun, 1 Jan 2025 00:00:00 UTC;`;
        document.cookie = `currentQuestion=${currentQuestion}; expires=Sun, 1 Jan 2025 00:00:00 UTC;`;
        document.cookie = `currentImageIndex=${currentImageIndex}; expires=Sun, 1 Jan 2025 00:00:00 UTC;`;
      }

      function getCookieData() {
        const cookies = document.cookie.split("; ").reduce((obj, cookie) => {
          const [key, value] = cookie.split("=");
          obj[key] = value;
          return obj;
        }, {});

        if (
          cookies.hasOwnProperty("guessesRemaining") &&
          cookies.hasOwnProperty("guessesUsed") &&
          cookies.hasOwnProperty("currentQuestion") &&
          cookies.hasOwnProperty("currentImageIndex")
        ) {
          return {
            guessesRemaining: parseInt(cookies.guessesRemaining),
            guessesUsed: parseInt(cookies.guessesUsed),
            currentQuestion: parseInt(cookies.currentQuestion),
            currentImageIndex: parseInt(cookies.currentImageIndex),
          };
        }

        return null;
      }

      function nextQuestion() {
        currentQuestion = (currentQuestion + 1) % quizQuestions.length;
        displayQuestion();
      }

      // Autocomplete functionality
      const answerInputElement = document.getElementById("answer-input");
      const suggestionsContainer = document.getElementById(
        "autocomplete-suggestions"
      );

      answerInputElement.addEventListener("input", function () {
        const userInput = answerInputElement.value.toLowerCase();
        const suggestions = getAutocompleteSuggestions(userInput);

        if (userInput === "") {
          suggestionsContainer.innerHTML = "";
        } else {
          suggestionsContainer.innerHTML = "";
          suggestions.forEach((suggestion) => {
            const suggestionElement = document.createElement("div");
            suggestionElement.textContent = toTitleCase(suggestion);
            // Inside the 'forEach' loop that creates the suggestion elements
            suggestionElement.classList.add(
              "autocomplete-item",
              "px-2",
              "py-1",
              "cursor-pointer",
              "rounded" // Add the 'rounded' class for rounded borders
            );
            suggestionElement.addEventListener("click", function () {
              answerInputElement.value = suggestion;
              suggestionsContainer.innerHTML = "";
            });
            suggestionsContainer.appendChild(suggestionElement);
          });
        }
      });

      function getAutocompleteSuggestions(userInput) {
        const existingAnswers = quizQuestions.map(
          (question) => question.answer
        );
        return existingAnswers.filter((answer) =>
          answer.toLowerCase().startsWith(userInput)
        );
      }

      function toTitleCase(str) {
        return str.replace(/\b\w+/g, function (txt) {
          return txt.charAt(0).toUpperCase() + txt.substr(1).toLowerCase();
        });
      }

        if (userInput === "") {

      // Handle keyboard events

        const suggestions = getAutocompleteSuggestions(
          answerInputElement.value.toLowerCase()
        );

        if (suggestions.length === 0) {
          return;
        }

        if (event.key === "ArrowUp") {
          event.preventDefault();
          if (selectedSuggestionIndex > 0) {
            selectedSuggestionIndex--;
          }
          updateSelectedSuggestionStyle();
        } else if (event.key === "ArrowDown") {
          event.preventDefault();
          if (selectedSuggestionIndex < suggestions.length - 1) {
            selectedSuggestionIndex++;
          }
          updateSelectedSuggestionStyle();
        } else if (event.key === "Enter") {
          event.preventDefault();
          if (selectedSuggestionIndex >= 0) {
            answerInputElement.value = suggestions[selectedSuggestionIndex];
            suggestionsContainer.innerHTML = "";
            selectedSuggestionIndex = -1; // Reset the selected suggestion index after pressing Enter
          }
        }

            const container = document.getElementById(
              "autocomplete-suggestions"
            );
            const scrollHeight =
              suggestionElement.offsetTop - container.offsetTop;
            container.scrollTop = scrollHeight;
          } else {
            suggestionElement.classList.remove("selected-suggestion");

        });

// Function to initialize the countdown and question update
function initializeCountdownAndQuestionUpdate() {
  const intervalDuration = 24 * 60 * 60 * 1000; // 24 hours in milliseconds
  let lastUpdateTime = parseInt(getCookie('lastUpdateTime'));
  let currentQuestion = parseInt(getCookie('currentQuestion'));

  if (!lastUpdateTime || isNaN(lastUpdateTime)) {
    lastUpdateTime = new Date().getTime();
    setCookie('lastUpdateTime', lastUpdateTime, intervalDuration);

    currentQuestion = 0;
    setCookie('currentQuestion', currentQuestion, intervalDuration);
  }

  const currentTime = new Date().getTime();
  const timeSinceLastUpdate = currentTime - lastUpdateTime;

  if (timeSinceLastUpdate >= intervalDuration) {
    // Update currentQuestion if 24 hours have passed
    currentQuestion = (currentQuestion + 1) % quizQuestions.length;
    setCookie('currentQuestion', currentQuestion, intervalDuration);

    lastUpdateTime = currentTime - (timeSinceLastUpdate % intervalDuration);
    setCookie('lastUpdateTime', lastUpdateTime, intervalDuration);
  }

  displayQuestion(currentQuestion); // Display the current question
}

// Call the function to initialize the countdown and question update
initializeCountdownAndQuestionUpdate();

// Function to set a cookie
function setCookie(name, value, maxAge) {
  const date = new Date();
  date.setTime(date.getTime() + maxAge);
  const expires = 'expires=' + date.toUTCString();
  document.cookie = name + '=' + value + '; ' + expires + '; path=/';
}

// Function to get a cookie value by name
function getCookie(name) {
  const value = '; ' + document.cookie;
  const parts = value.split('; ' + name + '=');
  if (parts.length === 2) {
    return parts.pop().split(';').shift();
  }
}
